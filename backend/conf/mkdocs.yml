site_name: LockdIn Backend
site_description: Backend onboarding and architecture docs for LockdIn

# Served by the backend app under /docs.
site_url: http://127.0.0.1:8000/docs/

# Paths are resolved relative to this config file (conf/).
docs_dir: ../docs
site_dir: ../.artifacts/docs_site

theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
