
name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lockedin_test
          POSTGRES_USER: lockedin
          POSTGRES_PASSWORD: secret
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Run backend tests
        run: uv run pytest tests/ -v
        working-directory: backend

      - name: Seed Postgres test database
        run: |
          docker exec -i "${{ job.services.postgres.id }}" psql -U lockedin -d lockedin_test < database/initdb/00-extensions.sql
          docker exec -i "${{ job.services.postgres.id }}" psql -U lockedin -d lockedin_test < database/initdb/10-schema.sql
          docker exec -i "${{ job.services.postgres.id }}" psql -U lockedin -d lockedin_test < database/initdb/20-seed.sql

      - name: Run Postgres smoke test
        run: uv run pytest tests/test_postgres_integration.py -v
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+psycopg://lockedin:secret@localhost:5433/lockedin_test
