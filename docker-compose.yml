services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lockedin}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - lockedin_postgres_data:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-LockdIn Backend}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-true}
      BIND: ${BIND:-0.0.0.0:8000}
      WORKERS: ${WORKERS:-1}
      WORKER_CLASS: ${WORKER_CLASS:-uvicorn.workers.UvicornWorker}
      LOGLEVEL: ${LOGLEVEL:-info}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lockedin}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_CONTAINER_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lockedin_postgres_data:
